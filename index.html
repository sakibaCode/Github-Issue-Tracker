<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Geist Font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI and Tailwind CSS CDN links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icon library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="login-page">

        <div class="flex flex-col justify-center items-center h-screen">

            <div class=" bg-base-200 border-base-300 rounded-box w-96 p-10 flex flex-col items-center gap-6">

                <div class="flex flex-col">
                    <img class="w-30 h-27 rounded" src="image/logo-github.jpeg" alt="Github Logo">
                    <h2 class="text-[15px] font-bold">Github Issue Tracker</h2>
                </div>

                <fieldset class="fieldset  border-base-300 rounded-box w-xs border p-4">
                    <legend class="fieldset-legend">Login</legend>

                    <label class="label text-black font-bold">Username</label>
                    <input id="username" type="text" class="input" placeholder="Enter Username" />
                    <p class="text-[#4A00Ff] text-[14px] ">Default : admin</p>

                    <label class="label text-black font-bold">Password</label>
                    <input id="password" type="password" class="input" placeholder="Enter Password" />
                    <p class="text-[#4A00Ff] text-[14px] ">Default : admin123</p>

                    <button id="login-button" class="btn btn-neutral mt-4 bg-[#4A00Ff]">Sign in</button>
                </fieldset>

            </div>

        </div>

    </section>

    <section id="main-page" class="hidden">

        <div class="navbar bg-base-100 shadow-sm px-30">
            <div class="flex-1">
                <span class="text-[25px] font-bold"><i class="fa-brands fa-github"></i>Github Issue Tracker</span>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <a onclick="" href="" class="btn btn-error" id="logout-button">Logout</a>
            </div>
        </div>

    </section>

    <script src="script/app.js"></script>

</body>

</html>
